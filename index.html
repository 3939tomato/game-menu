<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="description" content="3939tomatoが制作した2Dドット絵のモンスターRPGやシミュレーションゲームを公開しているポータルサイトです。">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3939tomato Game Portal</title>
    <style>
        /* 全体のデザイン */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1a1a2e; /* 濃い紺色 */
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-top: 50px;
            font-size: 2.5rem;
            text-shadow: 2px 2px #e94560;
        }

        /* ゲームを並べるエリア */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 40px;
            max-width: 1000px;
        }

        /* ゲームカード単体のデザイン */
        .game-card {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 15px;
            width: 300px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* マウスを乗せた時の動き */
        .game-card:hover {
            transform: translateY(-10px);
            border-color: #e94560;
            box-shadow: 0 15px 30px rgba(233, 69, 96, 0.4);
        }

        /* ゲーム画像を画像タグに変更し、スタイルを調整 */
        .thumbnail {
            width: 100%;
            height: 180px;
            object-fit: cover; /* 画像を崩さずトリミングして表示 */
            border-radius: 5px; /* 少し角を丸く */
        }

        .info {
            padding: 20px;
        }

        .info h2 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
        }

        .info p {
            font-size: 0.9rem;
            color: #add8e6;
            line-height: 1.6; /* 読みやすく */
        }
    </style>
</head>
<body>

    <h1>3939tomato's Games</h1>

    <div class="container">

        <a href="https://3939tomato.github.io/my-monster-rpg/" class="game-card">
            <img src="image_1.png" class="thumbnail" alt="RPG Thumbnail">
            <div class="info">
                <h2>My Monster RPG</h2>
                <p>オリジナルのモンスターを育ててダンジョンを攻略しよう‼<br>
                   2dドット絵のRPG</p>
            </div>
        </a>

        <a href="https://3939tomato.github.io/monster-farm/" class="game-card">
            <img src="image_0.png" class="thumbnail" alt="Farm Thumbnail">
            <div class="info">
                <h2>Monster Farm</h2>
                <p>オリジナルの生態系を作ろう‼<br>
                   2dドット絵の生態系シミュレーション</p>
            </div>
        </a>

    </div>

    <p style="margin-top: 50px; color: #555;">&copy; 2026 3939tomato</p>

</body>
</html>
